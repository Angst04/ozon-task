<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Progress</title>
  </head>

  <body>
    <div class="container">
      <div class="layout">
        <div class="progress-section">
          <h1 class="title">Progress</h1>
          <div class="progress-container">
            <div class="progress-block">
              <svg class="progress-svg" viewBox="0 0 120 120">
                <circle class="progress-bg" cx="60" cy="60" r="52"></circle>
                <circle class="progress-bar" cx="60" cy="60" r="52"></circle>
              </svg>
            </div>
          </div>
        </div>

        <div class="controls-section">
          <div class="control-row">
            <div class="value-input">
              <input
                type="number"
                id="valueInput"
                min="0"
                max="100"
                value="0"
              />
            </div>
            <span class="control-label">Value</span>
          </div>

          <div class="control-row">
            <label class="toggle">
              <input type="checkbox" />
              <span class="toggle-slider"></span>
            </label>
            <span class="control-label">Animate</span>
          </div>

          <div class="control-row">
            <label class="toggle">
              <input type="checkbox" />
              <span class="toggle-slider"></span>
            </label>
            <span class="control-label">Hide</span>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
